openapi: 3.1.0
info:
  title: Messari AI Research API
  description: 'Messari provides crypto research, analytics, fundamentals, intelligence,

    and asset profiles via a REST API at data.messari.io. Endpoints cover

    assets, markets, networks, exchanges, protocols, news/events, token

    unlocks, monitoring/watchlists, AI chat completions, research reports,

    and bulk datasets. Authentication is via the x-messari-api-key header.

    '
  version: '1.0'
  contact:
    name: Messari
    url: https://docs.messari.io/
servers:
- url: https://data.messari.io/api
  description: Production API (Messari Data API)
security:
- apiKeyAuth: []
tags:
- name: Research
paths:
  /v1/reports:
    get:
      tags:
      - Research
      summary: Get research reports
      responses:
        '200':
          description: Reports
  /v1/reports/{reportId}:
    get:
      tags:
      - Research
      summary: Get a specific research report
      parameters:
      - in: path
        name: reportId
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Report
  /v1/reports/tags:
    get:
      tags:
      - Research
      summary: Get report tags
      responses:
        '200':
          description: Tags
components:
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: x-messari-api-key
      description: Messari API key
