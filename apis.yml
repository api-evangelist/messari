description: >-
  Messari provides crypto research, analytics, fundamentals, intelligence, and asset profiles
  through a REST API at data.messari.io. Endpoints cover assets metrics, market data, news,
  Token Unlocks, screener, governance, treasuries, and AI-powered Messari Copilot. Authentication
  is via the x-messari-api-key header.
apis:
  - aid: messari:rest-api
    name: Messari REST API
    tags:
      - Crypto
      - Asset Data
      - Market Data
      - News
      - Fundamentals
      - Token Unlocks
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    baseURL: https://data.messari.io/api
    humanURL: https://messari.io/api/docs
    description: >-
      Comprehensive REST API exposing /v1, /v2 endpoints for asset metrics (price, market cap,
      ROI, mining stats, supply, developer activity, ROI), markets, news, Token Unlocks, screener,
      and curated intel. Higher-tier plans unlock proprietary research datasets.
    properties:
      - type: Documentation
        url: https://messari.io/api/docs
      - type: Pricing
        url: https://messari.io/pricing
    x-features:
      - Asset metrics across 1,500+ assets
      - News and intel feed
      - Token Unlocks dataset
      - Treasuries and governance
      - Messari Copilot AI agent (higher tiers)
    x-use-cases:
      - Power crypto research dashboards
      - Token-unlock alerting and risk
      - Curated news ingestion
