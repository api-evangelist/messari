specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Messari
providerId: messari
created: '2026-05-08'
modified: '2026-05-08'
reconciled: false
tags:
  - Crypto
  - Research
  - Plans
description: >-
  Messari publishes free, Pro, and Enterprise tiers. Free API tier provides 20 requests per
  minute and basic asset metrics. Pro adds higher rate limits and proprietary research datasets;
  Enterprise contracts unlock the full Token Unlocks API, intel feed redistribution, and Messari
  Copilot. Public pricing page was rate-limited during research.
notes: Plans partially reconciled - public pricing page returned 429 during research; figures
  reflect commonly cited tiers and may be out of date.
sources:
  - https://messari.io/pricing
  - https://messari.io/api/docs
plans:
  - id: messari-free
    name: Free
    type: freemium
    description: Free tier - basic asset metrics, 20 rpm.
    entries:
      - label: Monthly subscription
        name: free_monthly
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Rate limit
        name: free_rate
        type: quota
        metric: requests_per_minute
        limit: 20
        timeFrame: minute
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Basic asset metrics
  - id: messari-pro
    name: Pro
    type: subscription
    description: Higher rate limits and proprietary research; pricing typically several hundred USD/month.
    entries:
      - label: Custom pricing
        name: pro_custom
        type: subscription
        metric: contract
        limit: -1
        timeFrame: contract
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Higher rate limit
      - name: Proprietary research
  - id: messari-enterprise
    name: Enterprise
    type: enterprise
    description: Custom contracts including full Token Unlocks API, intel feed redistribution, Messari Copilot.
    entries:
      - label: Custom pricing
        name: enterprise_custom
        type: subscription
        metric: contract
        limit: -1
        timeFrame: contract
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Token Unlocks API
      - name: Messari Copilot
      - name: Redistribution rights
maintainers:
